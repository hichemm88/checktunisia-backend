version: '3.9'

# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml exec app php vendor/bin/phpunit
#   docker compose -f docker-compose.test.yml down -v

services:

  # ── PostgreSQL test database ──────────────────────────────────────────────
  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       checktunisia_test
      POSTGRES_USER:     checktunisia
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"   # 5433 to avoid conflict with any local Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checktunisia -d checktunisia_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Laravel app (with dev dependencies) ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      db_test:
        condition: service_healthy
    environment:
      APP_ENV:          testing
      APP_KEY:          base64:dGVzdGluZ3Rlc3Rpbmd0ZXN0aW5ndGVzdGluZ3Rlc3Q=
      APP_DEBUG:        "true"
      DB_CONNECTION:    pgsql
      DB_HOST:          db_test
      DB_PORT:          5432
      DB_DATABASE:      checktunisia_test
      DB_USERNAME:      checktunisia
      DB_PASSWORD:      secret
      CACHE_STORE:      array
      SESSION_DRIVER:   array
      QUEUE_CONNECTION: sync
      MAIL_MAILER:      array
      BCRYPT_ROUNDS:    4
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: ["tail", "-f", "/dev/null"]   # keep container alive
