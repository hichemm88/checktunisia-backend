version: '3.9'

# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml exec app php vendor/bin/phpunit
#   docker compose -f docker-compose.test.yml down -v

services:

  # ── PostgreSQL test database ──────────────────────────────────────────────
  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       qayed_test
      POSTGRES_USER:     qayed
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"   # 5433 to avoid conflict with any local Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qayed -d qayed_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Laravel app (with dev dependencies) ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      db_test:
        condition: service_healthy
    environment:
      APP_ENV:          testing
      APP_KEY:          base64:dGVzdGluZ3Rlc3Rpbmd0ZXN0aW5ndGVzdGluZ3Rlc3Q=
      APP_DEBUG:        "true"
      DB_CONNECTION:    pgsql
      DB_HOST:          db_test
      DB_PORT:          5432
      DB_DATABASE:      qayed_test
      DB_USERNAME:      qayed
      DB_PASSWORD:      secret
      CACHE_STORE:      array
      SESSION_DRIVER:   array
      QUEUE_CONNECTION: sync
      MAIL_MAILER:      array
      BCRYPT_ROUNDS:    4
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor   # preserve vendor from build layer
    working_dir: /var/www/html
    command: ["sh", "-c", "composer install --no-interaction --quiet && tail -f /dev/null"]

volumes:
  vendor_cache:

